<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>專題製作學習歷程牆</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-mark">BTS</span>
        <span class="brand-sep"></span>
        <span class="brand-sub">Student Showcase · 2026</span>
      </div>
      <div class="header-actions">
        <a id="upload-btn" class="btn btn-primary" href="#" target="_blank" rel="noopener">
          新增作品
        </a>
        <button id="refresh-btn" class="btn btn-ghost" title="手動刷新">⟳</button>
      </div>
    </div>
    <div class="status-bar">
      <span id="status-text">準備中…</span>
      <span id="last-updated"></span>
    </div>
  </header>

  <!-- Hero：展覽大標 -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">114T3 Exhibition</div>
      <h1 id="site-title" class="hero-title">載入中…</h1>
      <p id="site-subtitle" class="hero-sub"></p>
    </div>
  </section>

  <!-- 班級篩選列（展區分類） -->
  <nav id="class-filter" class="class-filter" role="tablist" aria-label="班級篩選">
    <!-- 按鈕由 JS 動態產生 -->
  </nav>

  <main>
    <!-- 本期作品 -->
    <section class="section" aria-labelledby="feed-heading">
      <div class="section-heading">
        <h2 id="feed-heading">本期作品</h2>
        <span class="section-index">01</span>
        <span class="section-sub" id="feed-sub">全班最近的 12 件</span>
      </div>
      <div id="feed" class="feed">
        <div class="placeholder">LOADING…</div>
      </div>
    </section>

    <!-- 創作者名冊 -->
    <section class="section" aria-labelledby="students-heading">
      <div class="section-heading">
        <h2 id="students-heading">創作者名冊</h2>
        <span class="section-index">02</span>
        <span class="section-sub">點任何一位同學進入個人展區</span>
      </div>
      <div id="students-container">
        <!-- 由 JS 動態產生分班區塊 -->
      </div>
    </section>
  </main>

  <!-- 作品詳情 -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">學生名字</h3>
        <button class="modal-close" data-close-modal aria-label="關閉">×</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-rule"></div>
    <p>AUTO-REFRESH EVERY <span id="refresh-interval-label">30</span> SECONDS</p>
    <p class="footer-credit">BTS Student Showcase · Curated for Project-Based Learning</p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
